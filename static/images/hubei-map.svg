<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="500" height="450">
  <!-- 背景 -->
  <rect width="500" height="450" fill="#f5f5f5"/>
  
  <!-- 标题 -->
  <text x="250" y="30" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">湖北省示意图</text>
  
  <!-- 湖北省轮廓（简化） -->
  <path d="M 150 100 
           L 200 80 
           L 280 70 
           L 350 90 
           L 400 120 
           L 420 180 
           L 400 250 
           L 380 300 
           L 350 350 
           L 280 380 
           L 200 370 
           L 150 340 
           L 120 280 
           L 100 200 
           L 120 140 
           Z" 
        fill="#a8d5a2" stroke="#2e7d32" stroke-width="3"/>
  
  <!-- 长江 -->
  <path d="M 100 280 Q 180 260 250 270 Q 320 280 400 300" 
        fill="none" stroke="#2196f3" stroke-width="4"/>
  <text x="250" y="255" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" fill="#1565c0">长江</text>
  
  <!-- 汉江 -->
  <path d="M 150 180 Q 200 220 250 270" 
        fill="none" stroke="#64b5f6" stroke-width="3"/>
  <text x="180" y="200" font-family="Microsoft YaHei" font-size="10" fill="#1976d2">汉江</text>
  
  <!-- 武汉市 -->
  <circle cx="280" cy="250" r="8" fill="#f44336"/>
  <text x="295" y="245" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#c62828">武汉市</text>
  
  <!-- 宜昌市 -->
  <circle cx="180" cy="280" r="6" fill="#ff9800"/>
  <text x="190" y="275" font-family="Microsoft YaHei" font-size="10" fill="#e65100">宜昌市</text>
  
  <!-- 襄阳市 -->
  <circle cx="200" cy="160" r="6" fill="#ff9800"/>
  <text x="210" y="155" font-family="Microsoft YaHei" font-size="10" fill="#e65100">襄阳市</text>
  
  <!-- 荆州市 -->
  <circle cx="200" cy="320" r="6" fill="#ff9800"/>
  <text x="210" y="315" font-family="Microsoft YaHei" font-size="10" fill="#e65100">荆州市</text>
  
  <!-- 江汉平原标注 -->
  <ellipse cx="250" cy="310" rx="60" ry="30" fill="none" stroke="#795548" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="250" y="340" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" fill="#5d4037">江汉平原</text>
  
  <!-- 神农架 -->
  <path d="M 140 200 L 160 180 L 180 200 L 160 220 Z" fill="#4caf50"/>
  <text x="160" y="235" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#2e7d32">神农架</text>
  
  <!-- 武当山 -->
  <path d="M 170 140 L 190 120 L 210 140 L 190 160 Z" fill="#4caf50"/>
  <text x="190" y="175" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#2e7d32">武当山</text>
  
  <!-- 大别山 -->
  <path d="M 350 180 L 370 160 L 390 180 L 370 200 Z" fill="#4caf50"/>
  <text x="370" y="215" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#2e7d32">大别山</text>
  
  <!-- 三峡标注 -->
  <rect x="100" y="290" width="40" height="20" fill="#fff3e0" stroke="#ff9800" rx="3"/>
  <text x="120" y="305" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#e65100">三峡</text>
  
  <!-- 图例 -->
  <rect x="20" y="390" width="460" height="50" fill="white" stroke="#ddd" rx="5"/>
  
  <circle cx="50" cy="410" r="5" fill="#f44336"/>
  <text x="60" y="415" font-family="Microsoft YaHei" font-size="10" fill="#333">省会</text>
  
  <circle cx="110" cy="410" r="5" fill="#ff9800"/>
  <text x="120" y="415" font-family="Microsoft YaHei" font-size="10" fill="#333">地级市</text>
  
  <line x1="170" y1="410" x2="200" y2="410" stroke="#2196f3" stroke-width="3"/>
  <text x="210" y="415" font-family="Microsoft YaHei" font-size="10" fill="#333">河流</text>
  
  <path d="M 270 405 L 280 400 L 290 405 L 280 410 Z" fill="#4caf50"/>
  <text x="300" y="415" font-family="Microsoft YaHei" font-size="10" fill="#333">山地</text>
  
  <ellipse cx="370" cy="410" rx="15" ry="8" fill="none" stroke="#795548" stroke-dasharray="3,2"/>
  <text x="395" y="415" font-family="Microsoft YaHei" font-size="10" fill="#333">平原</text>
  
  <!-- 比例尺 -->
  <line x1="430" y1="425" x2="470" y2="425" stroke="#333" stroke-width="2"/>
  <line x1="430" y1="420" x2="430" y2="430" stroke="#333" stroke-width="2"/>
  <line x1="470" y1="420" x2="470" y2="430" stroke="#333" stroke-width="2"/>
  <text x="450" y="445" text-anchor="middle" font-family="Arial" font-size="9" fill="#333">100km</text>
  
  <!-- 指向标 -->
  <circle cx="460" cy="60" r="20" fill="white" stroke="#333"/>
  <text x="460" y="55" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e74c3c">N</text>
  <path d="M 460 45 L 455 55 L 460 50 L 465 55 Z" fill="#e74c3c"/>
</svg>