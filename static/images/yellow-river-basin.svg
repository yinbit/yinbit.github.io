<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <rect width="900" height="550" fill="#f9f9f9"/>
  
  <title>黄河流域示意图</title>
  
  <text x="450" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">黄河流域示意图</text>
  
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="800" height="400" fill="#e8f4f8" stroke="#333" stroke-width="1"/>
    
    <path d="M 50 200 L 100 180 L 150 190 L 200 170 L 250 185 L 300 160 L 350 175 L 400 150 L 450 165 L 500 140 L 550 155 L 600 130 L 650 145 L 700 120 L 750 135 L 780 150" 
          fill="none" stroke="#e74c3c" stroke-width="4"/>
    
    <path d="M 50 200 Q 80 220 100 250 Q 120 280 150 300 Q 180 320 220 310 Q 260 300 300 280 Q 340 260 380 240 Q 420 220 460 200 Q 500 180 540 160 Q 580 140 620 120 Q 660 100 700 90 Q 740 80 780 85" 
          fill="none" stroke="#e74c3c" stroke-width="3" opacity="0.5"/>
    
    <circle cx="100" cy="180" r="10" fill="#3498db"/>
    <text x="115" y="175" font-family="Arial" font-size="11" font-weight="bold" fill="#2980b9">源头</text>
    
    <circle cx="350" cy="175" r="12" fill="#f39c12"/>
    <text x="365" y="170" font-family="Arial" font-size="12" font-weight="bold" fill="#d68910">兰州</text>
    
    <circle cx="500" cy="140" r="12" fill="#e67e22"/>
    <text x="515" y="135" font-family="Arial" font-size="12" font-weight="bold" fill="#d35400">河口</text>
    <text x="515" y="150" font-family="Arial" font-size="10" fill="#d35400">(中游结束)</text>
    
    <circle cx="650" cy="145" r="12" fill="#9b59b6"/>
    <text x="665" y="140" font-family="Arial" font-size="12" font-weight="bold" fill="#8e44ad">桃花峪</text>
    <text x="665" y="155" font-family="Arial" font-size="10" fill="#8e44ad">(下游开始)</text>
    
    <circle cx="780" cy="150" r="10" fill="#2ecc71"/>
    <text x="795" y="145" font-family="Arial" font-size="11" font-weight="bold" fill="#27ae60">入海口</text>
    
    <rect x="150" y="160" width="200" height="80" fill="#FFA500" opacity="0.3" stroke="#FF8C00" stroke-width="2" rx="5"/>
    <text x="250" y="195" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#d35400">上游</text>
    <text x="250" y="215" font-family="Arial" font-size="10" text-anchor="middle" fill="#8B4513">峡谷多、水流急</text>
    <text x="250" y="230" font-family="Arial" font-size="10" text-anchor="middle" fill="#8B4513">水能资源丰富</text>
    
    <rect x="380" y="120" width="200" height="80" fill="#FFD700" opacity="0.3" stroke="#DAA520" stroke-width="2" rx="5"/>
    <text x="480" y="155" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#8B4513">中游</text>
    <text x="480" y="175" font-family="Arial" font-size="10" text-anchor="middle" fill="#8B4513">流经黄土高原</text>
    <text x="480" y="190" font-family="Arial" font-size="10" text-anchor="middle" fill="#8B4513">含沙量大</text>
    
    <rect x="600" y="120" width="180" height="80" fill="#87CEEB" opacity="0.3" stroke="#4682B4" stroke-width="2" rx="5"/>
    <text x="690" y="155" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">下游</text>
    <text x="690" y="175" font-family="Arial" font-size="10" text-anchor="middle" fill="#2c3e50">流经华北平原</text>
    <text x="690" y="190" font-family="Arial" font-size="10" text-anchor="middle" fill="#2c3e50">形成"地上河"</text>
    
    <ellipse cx="480" cy="280" rx="100" ry="60" fill="#D2691E" opacity="0.3" stroke="#8B4513" stroke-width="2"/>
    <text x="480" y="275" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#8B4513">黄土高原</text>
    <text x="480" y="295" font-family="Arial" font-size="10" text-anchor="middle" fill="#8B4513">水土流失严重</text>
    
    <ellipse cx="690" cy="250" rx="80" ry="50" fill="#90EE90" opacity="0.3" stroke="#228B22" stroke-width="2"/>
    <text x="690" y="245" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#2e7d32">华北平原</text>
    <text x="690" y="265" font-family="Arial" font-size="10" text-anchor="middle" fill="#2e7d32">农业发达</text>
    
    <path d="M 650 180 L 700 200 L 750 180 L 800 200" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <text x="725" y="220" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#c0392b">地上河</text>
    
    <path d="M 100 250 L 150 270 L 200 250 L 250 270 L 300 250 L 350 270" 
          fill="none" stroke="#4a90e2" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="225" y="290" font-family="Arial" font-size="10" fill="#4a90e2">主要支流</text>
    
    <circle cx="200" cy="200" r="8" fill="#9b59b6"/>
    <text x="215" y="195" font-family="Arial" font-size="10" fill="#8e44ad">湟水</text>
    
    <circle cx="400" cy="190" r="8" fill="#9b59b6"/>
    <text x="415" y="185" font-family="Arial" font-size="10" fill="#8e44ad">渭河</text>
    
    <circle cx="450" cy="200" r="8" fill="#9b59b6"/>
    <text x="465" y="195" font-family="Arial" font-size="10" fill="#8e44ad">汾河</text>
  </g>
  
  <g transform="translate(50, 480)">
    <text x="0" y="0" font-family="Arial" font-size="12" font-weight="bold" fill="#333">图例：</text>
    
    <line x1="50" y1="-5" x2="80" y2="-5" stroke="#e74c3c" stroke-width="4"/>
    <text x="85" y="0" font-family="Arial" font-size="10" fill="#333">黄河干流</text>
    
    <line x1="160" y1="-5" x2="190" y2="-5" stroke="#4a90e2" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="195" y="0" font-family="Arial" font-size="10" fill="#333">主要支流</text>
    
    <circle cx="280" cy="-5" r="6" fill="#3498db"/>
    <text x="290" y="0" font-family="Arial" font-size="10" fill="#333">重要地点</text>
    
    <rect x="360" y="-12" width="20" height="15" fill="#D2691E" opacity="0.3" stroke="#8B4513" stroke-width="1"/>
    <text x="385" y="0" font-family="Arial" font-size="10" fill="#333">黄土高原</text>
    
    <rect x="460" y="-12" width="20" height="15" fill="#90EE90" opacity="0.3" stroke="#228B22" stroke-width="1"/>
    <text x="485" y="0" font-family="Arial" font-size="10" fill="#333">华北平原</text>
  </g>
  
  <text x="450" y="530" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">图6 黄河流域示意图</text>
</svg>
