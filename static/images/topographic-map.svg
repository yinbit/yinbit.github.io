<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="500" height="400" fill="#f5f5f5"/>
  
  <!-- 标题 -->
  <text x="250" y="30" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">等高线地形图</text>
  
  <!-- 等高线 - 外围 -->
  <ellipse cx="250" cy="220" rx="180" ry="140" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <text x="70" y="220" font-family="Arial" font-size="12" fill="#27ae60">100m</text>
  
  <!-- 等高线 - 第二圈 -->
  <ellipse cx="250" cy="220" rx="140" ry="110" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <text x="110" y="220" font-family="Arial" font-size="12" fill="#27ae60">150m</text>
  
  <!-- 等高线 - 第三圈 -->
  <ellipse cx="250" cy="220" rx="100" ry="80" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <text x="150" y="220" font-family="Arial" font-size="12" fill="#27ae60">200m</text>
  
  <!-- 等高线 - 第四圈（山顶） -->
  <ellipse cx="250" cy="220" rx="50" ry="40" fill="none" stroke="#2ecc71" stroke-width="2"/>
  <text x="250" y="225" text-anchor="middle" font-family="Arial" font-size="12" fill="#27ae60">300m</text>
  
  <!-- A点标记 -->
  <circle cx="200" cy="180" r="5" fill="#e74c3c"/>
  <text x="185" y="170" font-family="Arial" font-size="14" font-weight="bold" fill="#e74c3c">A</text>
  
  <!-- B点标记 -->
  <circle cx="350" cy="280" r="5" fill="#3498db"/>
  <text x="360" y="285" font-family="Arial" font-size="14" font-weight="bold" fill="#3498db">B</text>
  
  <!-- C点标记（陡崖） -->
  <path d="M 280 140 L 280 160 L 285 155 L 280 150 L 285 145 L 280 140" stroke="#9b59b6" stroke-width="2" fill="none"/>
  <text x="290" y="150" font-family="Arial" font-size="14" font-weight="bold" fill="#9b59b6">C</text>
  
  <!-- D点标记（山谷） -->
  <circle cx="180" cy="250" r="5" fill="#f39c12"/>
  <text x="160" y="265" font-family="Arial" font-size="14" font-weight="bold" fill="#f39c12">D</text>
  
  <!-- E点标记 -->
  <circle cx="100" cy="300" r="5" fill="#1abc9c"/>
  <text x="85" y="295" font-family="Arial" font-size="14" font-weight="bold" fill="#1abc9c">E</text>
  
  <!-- F点标记（山顶） -->
  <circle cx="250" cy="220" r="5" fill="#e74c3c"/>
  <text x="260" y="210" font-family="Arial" font-size="14" font-weight="bold" fill="#e74c3c">F</text>
  
  <!-- G点标记 -->
  <circle cx="380" cy="300" r="5" fill="#1abc9c"/>
  <text x="390" y="305" font-family="Arial" font-size="14" font-weight="bold" fill="#1abc9c">G</text>
  
  <!-- EF线路 -->
  <path d="M 100 300 Q 150 250 200 180 Q 230 150 250 220" stroke="#1abc9c" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  
  <!-- GF线路 -->
  <path d="M 380 300 Q 350 280 300 260 Q 270 240 250 220" stroke="#e67e22" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  
  <!-- 图例 -->
  <rect x="20" y="350" width="460" height="40" fill="white" stroke="#ddd" rx="5"/>
  <circle cx="50" cy="370" r="5" fill="#e74c3c"/>
  <text x="60" y="375" font-family="Microsoft YaHei" font-size="11" fill="#333">A、B-海拔点</text>
  <text x="140" y="375" font-family="Microsoft YaHei" font-size="11" fill="#9b59b6">C-陡崖</text>
  <text x="200" y="375" font-family="Microsoft YaHei" font-size="11" fill="#f39c12">D-山谷</text>
  <text x="260" y="375" font-family="Microsoft YaHei" font-size="11" fill="#e74c3c">F-山顶</text>
  <line x1="320" y1="370" x2="350" y2="370" stroke="#1abc9c" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="355" y="375" font-family="Microsoft YaHei" font-size="11" fill="#333">登山线路</text>
  
  <!-- 比例尺 -->
  <line x1="380" y1="370" x2="450" y2="370" stroke="#333" stroke-width="2"/>
  <line x1="380" y1="365" x2="380" y2="375" stroke="#333" stroke-width="2"/>
  <line x1="450" y1="365" x2="450" y2="375" stroke="#333" stroke-width="2"/>
  <text x="415" y="385" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">1km</text>
  
  <!-- 指向标 -->
  <circle cx="460" cy="60" r="20" fill="white" stroke="#333"/>
  <text x="460" y="55" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e74c3c">N</text>
  <path d="M 460 45 L 455 55 L 460 50 L 465 55 Z" fill="#e74c3c"/>
</svg>