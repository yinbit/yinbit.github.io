<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="hillGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="500" fill="#f9f9f9"/>
  
  <title>等高线地形图</title>
  
  <text x="300" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">等高线地形图</text>
  
  <text x="50" y="60" font-family="Arial" font-size="12" fill="#666">比例尺：1:50000</text>
  <text x="50" y="80" font-family="Arial" font-size="12" fill="#666">等高距：50米</text>
  
  <g transform="translate(50, 100)">
    <ellipse cx="250" cy="150" rx="200" ry="150" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-dasharray="none"/>
    <text x="455" y="150" font-family="Arial" font-size="11" fill="#8B4513">100m</text>
    
    <ellipse cx="250" cy="150" rx="150" ry="110" fill="none" stroke="#8B4513" stroke-width="1.5"/>
    <text x="405" y="150" font-family="Arial" font-size="11" fill="#8B4513">150m</text>
    
    <ellipse cx="250" cy="150" rx="100" ry="70" fill="none" stroke="#8B4513" stroke-width="1.5"/>
    <text x="355" y="150" font-family="Arial" font-size="11" fill="#8B4513">200m</text>
    
    <ellipse cx="250" cy="150" rx="50" ry="35" fill="none" stroke="#8B4513" stroke-width="1.5"/>
    <text x="305" y="150" font-family="Arial" font-size="11" fill="#8B4513">250m</text>
    
    <circle cx="250" cy="150" r="8" fill="#333"/>
    <text x="250" y="135" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">300m</text>
    
    <path d="M 150 200 Q 200 180 250 200 Q 300 220 350 200" fill="none" stroke="#4a90e2" stroke-width="2"/>
    <text x="360" y="205" font-family="Arial" font-size="11" fill="#4a90e2">河流</text>
    
    <path d="M 100 120 L 150 150 L 200 130 L 250 160 L 300 140 L 350 170 L 400 150" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="410" y="155" font-family="Arial" font-size="11" fill="#e74c3c">剖面线</text>
    
    <circle cx="180" cy="180" r="5" fill="#e74c3c"/>
    <text x="165" y="170" font-family="Arial" font-size="14" font-weight="bold" fill="#e74c3c">A</text>
    
    <circle cx="320" cy="120" r="5" fill="#3498db"/>
    <text x="330" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="#3498db">B</text>
    
    <path d="M 280 200 L 290 180 L 300 200 L 310 180 L 320 200" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <text x="330" y="190" font-family="Arial" font-size="14" font-weight="bold" fill="#2ecc71">C</text>
    
    <ellipse cx="380" cy="250" rx="30" ry="20" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="370" y="280" font-family="Arial" font-size="14" font-weight="bold" fill="#9b59b6">D</text>
  </g>
  
  <g transform="translate(50, 420)">
    <text x="0" y="0" font-family="Arial" font-size="12" font-weight="bold" fill="#333">图例：</text>
    <line x1="50" y1="-5" x2="80" y2="-5" stroke="#8B4513" stroke-width="1.5"/>
    <text x="85" y="0" font-family="Arial" font-size="11" fill="#333">等高线</text>
    
    <line x1="150" y1="-5" x2="180" y2="-5" stroke="#4a90e2" stroke-width="2"/>
    <text x="185" y="0" font-family="Arial" font-size="11" fill="#333">河流</text>
    
    <circle cx="260" cy="-5" r="4" fill="#333"/>
    <text x="270" y="0" font-family="Arial" font-size="11" fill="#333">山顶</text>
    
    <path d="M 340 -10 L 350 0 L 360 -10" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <text x="370" y="0" font-family="Arial" font-size="11" fill="#333">陡崖</text>
  </g>
  
  <text x="300" y="480" font-family="Arial" font-size="11" fill="#999" text-anchor="middle">图1 等高线地形图</text>
</svg>
