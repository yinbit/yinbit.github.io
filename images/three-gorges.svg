<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <!-- 背景 -->
  <rect width="500" height="400" fill="#f5f5f5"/>
  
  <!-- 标题 -->
  <text x="250" y="30" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">三峡工程示意图</text>
  
  <!-- 山体背景 -->
  <path d="M 0 200 L 100 100 L 150 150 L 200 80 L 250 120 L 300 60 L 350 100 L 400 70 L 450 110 L 500 90 L 500 400 L 0 400 Z" fill="#8d6e63" opacity="0.3"/>
  
  <!-- 上游水库 -->
  <rect x="0" y="180" width="200" height="100" fill="#64b5f6" opacity="0.7"/>
  <text x="100" y="220" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" fill="#0d47a1">水库（上游）</text>
  
  <!-- 大坝主体 -->
  <rect x="195" y="120" width="30" height="180" fill="#78909c"/>
  <rect x="195" y="120" width="30" height="180" fill="url(#damGradient)"/>
  
  <!-- 大坝渐变 -->
  <defs>
    <linearGradient id="damGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#546e7a"/>
      <stop offset="50%" style="stop-color:#90a4ae"/>
      <stop offset="100%" style="stop-color:#546e7a"/>
    </linearGradient>
  </defs>
  
  <!-- 泄洪闸 -->
  <rect x="200" y="200" width="20" height="50" fill="#42a5f5"/>
  <path d="M 210 250 L 210 280 L 230 300 L 190 300 L 210 280" fill="#42a5f5" opacity="0.8"/>
  <text x="210" y="320" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" fill="#1565c0">泄洪</text>
  
  <!-- 下游河流 -->
  <path d="M 225 300 Q 300 310 400 290 L 500 300 L 500 400 L 225 400 Z" fill="#64b5f6" opacity="0.5"/>
  <text x="350" y="340" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" fill="#0d47a1">下游</text>
  
  <!-- 发电机房 -->
  <rect x="230" y="220" width="40" height="30" fill="#ffb74d"/>
  <text x="250" y="240" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#e65100">发电机组</text>
  
  <!-- 电塔 -->
  <path d="M 280 180 L 280 150 L 290 150 L 290 180" stroke="#333" stroke-width="2"/>
  <path d="M 275 155 L 285 155" stroke="#333" stroke-width="2"/>
  <path d="M 275 165 L 285 165" stroke="#333" stroke-width="2"/>
  <line x1="290" y1="155" x2="320" y2="140" stroke="#333" stroke-width="1"/>
  <line x1="290" y1="165" x2="320" y2="160" stroke="#333" stroke-width="1"/>
  <text x="310" y="130" font-family="Microsoft YaHei" font-size="9" fill="#333">输电</text>
  
  <!-- 船闸 -->
  <rect x="270" y="260" width="60" height="40" fill="#81c784" stroke="#388e3c" stroke-width="1"/>
  <line x1="280" y1="260" x2="280" y2="300" stroke="#388e3c" stroke-width="1"/>
  <line x1="290" y1="260" x2="290" y2="300" stroke="#388e3c" stroke-width="1"/>
  <line x1="300" y1="260" x2="300" y2="300" stroke="#388e3c" stroke-width="1"/>
  <line x1="310" y1="260" x2="310" y2="300" stroke="#388e3c" stroke-width="1"/>
  <line x1="320" y1="260" x2="320" y2="300" stroke="#388e3c" stroke-width="1"/>
  <text x="300" y="320" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#2e7d32">船闸</text>
  
  <!-- 小船 -->
  <ellipse cx="285" cy="275" rx="8" ry="4" fill="#795548"/>
  <rect x="283" y="268" width="2" height="10" fill="#5d4037"/>
  
  <!-- 水位标注 -->
  <line x1="50" y1="180" x2="50" y2="280" stroke="#f44336" stroke-width="2"/>
  <line x1="45" y1="180" x2="55" y2="180" stroke="#f44336" stroke-width="2"/>
  <line x1="45" y1="280" x2="55" y2="280" stroke="#f44336" stroke-width="2"/>
  <text x="30" y="235" font-family="Microsoft YaHei" font-size="10" fill="#c62828" transform="rotate(-90, 30, 235)">水位落差</text>
  
  <!-- 功能标注 -->
  <rect x="20" y="50" width="120" height="80" fill="white" stroke="#ddd" rx="5"/>
  <text x="80" y="70" text-anchor="middle" font-family="Microsoft YaHei" font-size="11" font-weight="bold" fill="#333">三峡工程功能</text>
  <text x="30" y="90" font-family="Microsoft YaHei" font-size="10" fill="#e74c3c">● 防洪（首要功能）</text>
  <text x="30" y="105" font-family="Microsoft YaHei" font-size="10" fill="#f39c12">● 发电</text>
  <text x="30" y="120" font-family="Microsoft YaHei" font-size="10" fill="#3498db">● 航运</text>
  
  <!-- 数据标注 -->
  <rect x="380" y="50" width="110" height="70" fill="white" stroke="#ddd" rx="5"/>
  <text x="435" y="70" text-anchor="middle" font-family="Microsoft YaHei" font-size="11" font-weight="bold" fill="#333">工程数据</text>
  <text x="390" y="90" font-family="Microsoft YaHei" font-size="9" fill="#333">坝高：185米</text>
  <text x="390" y="105" font-family="Microsoft YaHei" font-size="9" fill="#333">坝长：2309米</text>
  <text x="390" y="120" font-family="Microsoft YaHei" font-size="9" fill="#333">装机容量：2240万千瓦</text>
  
  <!-- 图例 -->
  <rect x="20" y="350" width="460" height="40" fill="white" stroke="#ddd" rx="5"/>
  <rect x="40" y="365" width="15" height="10" fill="#78909c"/>
  <text x="60" y="375" font-family="Microsoft YaHei" font-size="10" fill="#333">大坝</text>
  <rect x="110" y="365" width="15" height="10" fill="#64b5f6"/>
  <text x="130" y="375" font-family="Microsoft YaHei" font-size="10" fill="#333">水体</text>
  <rect x="180" y="365" width="15" height="10" fill="#ffb74d"/>
  <text x="200" y="375" font-family="Microsoft YaHei" font-size="10" fill="#333">发电设施</text>
  <rect x="260" y="365" width="15" height="10" fill="#81c784"/>
  <text x="280" y="375" font-family="Microsoft YaHei" font-size="10" fill="#333">船闸</text>
  <rect x="330" y="365" width="15" height="10" fill="#42a5f5"/>
  <text x="350" y="375" font-family="Microsoft YaHei" font-size="10" fill="#333">泄洪</text>
  
  <!-- 位置标注 -->
  <text x="210" y="115" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" font-weight="bold" fill="#37474f">三峡大坝</text>
  <text x="210" y="370" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" fill="#666">（湖北省宜昌市境内）</text>
</svg>